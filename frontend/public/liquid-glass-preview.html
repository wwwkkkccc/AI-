<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume AI - 液态玻璃预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* 液态玻璃卡片 */
        .glass-card {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.08) 100%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.3);
            padding: 48px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            transform: translateY(-4px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.25),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.4);
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.3) 0%, rgba(10, 132, 255, 0.2) 100%);
            border: 1px solid rgba(10, 132, 255, 0.4);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 32px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 液态玻璃按钮 */
        .glass-btn {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .glass-btn-primary {
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.8) 0%, rgba(10, 132, 255, 0.6) 100%);
        }

        .glass-btn-primary:hover {
            background: linear-gradient(135deg, rgba(10, 122, 239, 0.9) 0%, rgba(10, 122, 239, 0.7) 100%);
            transform: translateY(-2px);
            box-shadow:
                0 12px 40px rgba(10, 132, 255, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.25);
        }

        .glass-btn-secondary {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.08) 100%);
        }

        .glass-btn-secondary:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.12) 100%);
            transform: translateY(-2px);
        }

        .glass-btn:active {
            transform: translateY(0);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.12),
                inset 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* 背景装饰 */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(10, 132, 255, 0.4) 0%, transparent 70%);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, transparent 70%);
            bottom: -250px;
            right: -250px;
            animation-delay: 2s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-top: 48px;
        }

        .info-card {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }

        .info-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .info-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .info-card p {
            font-size: 14px;
            margin: 0;
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .glass-card {
                padding: 32px 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .glass-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="container">
        <div class="glass-card">
            <span class="badge">iOS 26 Liquid Glass</span>
            <h1>液态玻璃风格预览</h1>
            <p>
                这是 Resume AI 项目的液态玻璃风格系统预览页面。<br>
                体验毛玻璃背景模糊、多层阴影叠加、流畅的交互动画。
            </p>

            <div class="button-group">
                <a href="/resume-ai/" class="glass-btn glass-btn-primary">
                    进入主应用
                </a>
                <a href="https://github.com/wwwkkkccc/AI-" class="glass-btn glass-btn-secondary" target="_blank">
                    查看源码
                </a>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <h3>✨ 毛玻璃效果</h3>
                <p>backdrop-filter: blur(20px) 实现的背景模糊效果</p>
            </div>
            <div class="info-card">
                <h3>🎨 多层阴影</h3>
                <p>外层投影 + 内层高光，模拟真实玻璃质感</p>
            </div>
            <div class="info-card">
                <h3>🎯 流畅动画</h3>
                <p>60fps 的流畅过渡动画和交互反馈</p>
            </div>
            <div class="info-card">
                <h3>📱 响应式设计</h3>
                <p>完美适配桌面端、平板和移动设备</p>
            </div>
        </div>
    </div>
</body>
</html>
