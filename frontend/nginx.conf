# Nginx 前端服务配置
server {
  listen 80;              # 监听 80 端口
  server_name _;          # 匹配所有域名
  root /usr/share/nginx/html;  # 静态文件根目录
  index index.html;       # 默认首页

  # 反向代理：将 /api/ 开头的请求转发到后端服务
  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;                          # 传递原始 Host
    proxy_set_header X-Real-IP $remote_addr;              # 传递客户端真实 IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 传递代理链 IP
    proxy_set_header X-Forwarded-Proto $scheme;           # 传递协议类型（http/https）
  }

  # 反向代理：精确匹配 /api（不带尾部斜杠）
  location = /api {
    proxy_pass http://backend:8080/api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 前端路由：所有未匹配的路径回退到 index.html（支持 SPA 路由）
  location / {
    try_files $uri $uri/ /index.html;
  }
}
