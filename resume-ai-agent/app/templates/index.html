<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="./static/style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>AI简历优化智能体</h1>
      <p>上传简历并粘贴岗位JD，自动生成ATS评分与优化建议</p>
      <div class="badge">在线分析服务</div>
    </header>

    <section class="card">
      <h2>1. 提交分析</h2>
      <form id="analyzeForm">
        <div class="row">
          <label>目标岗位（可选）</label>
          <input id="targetRole" name="target_role" type="text" placeholder="例如：后端开发工程师" maxlength="100" />
        </div>
        <div class="row">
          <label>上传简历（PDF / DOCX / TXT）</label>
          <input id="resumeFile" name="file" type="file" accept=".pdf,.docx,.txt,.md" required />
        </div>
        <div class="row">
          <label>岗位JD</label>
          <textarea id="jdText" name="jd_text" rows="9" placeholder="粘贴完整岗位描述" required></textarea>
        </div>
        <button id="analyzeBtn" type="submit">开始分析</button>
      </form>
      <div id="status"></div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2>2. 分析结果</h2>
      <div class="score-grid">
        <div class="metric"><span>ATS评分</span><strong id="scoreVal">-</strong></div>
        <div class="metric"><span>关键词覆盖率</span><strong id="coverageVal">-</strong></div>
      </div>

      <div class="split">
        <div>
          <h3>已匹配关键词</h3>
          <div id="matchedKeywords" class="chips"></div>
        </div>
        <div>
          <h3>缺失关键词</h3>
          <div id="missingKeywords" class="chips warning"></div>
        </div>
      </div>

      <h3>优化摘要</h3>
      <p id="summary"></p>

      <h3>建议改写（项目/经历）</h3>
      <ul id="rewrites"></ul>

      <h3>技能优化建议</h3>
      <ul id="skills"></ul>

      <h3>面试问题清单</h3>
      <ul id="interviews"></ul>

      <div class="actions">
        <button id="downloadMd" type="button">下载优化建议（Markdown）</button>
      </div>
    </section>
  </main>

  <script>
    const state = {
      markdown: "",
    };

    const el = {
      form: document.getElementById("analyzeForm"),
      status: document.getElementById("status"),
      resultCard: document.getElementById("resultCard"),
      scoreVal: document.getElementById("scoreVal"),
      coverageVal: document.getElementById("coverageVal"),
      matchedKeywords: document.getElementById("matchedKeywords"),
      missingKeywords: document.getElementById("missingKeywords"),
      summary: document.getElementById("summary"),
      rewrites: document.getElementById("rewrites"),
      skills: document.getElementById("skills"),
      interviews: document.getElementById("interviews"),
      downloadMd: document.getElementById("downloadMd"),
    };

    function setStatus(msg, isError=false) {
      el.status.textContent = msg;
      el.status.className = isError ? "error" : "ok";
    }

    function renderChips(container, items) {
      container.innerHTML = "";
      if (!items || !items.length) {
        container.innerHTML = '<span class="chip">无</span>';
        return;
      }
      items.forEach((item) => {
        const span = document.createElement("span");
        span.className = "chip";
        span.textContent = item;
        container.appendChild(span);
      });
    }

    function extractErrorMessage(err) {
      if (!err) return "分析失败";
      if (typeof err === "string") return err;
      if (Array.isArray(err.detail) && err.detail.length) {
        const first = err.detail[0] || {};
        const loc = Array.isArray(first.loc) ? first.loc.join(".") : "";
        if (loc.includes("jd_text")) {
          return "岗位JD太短：请至少输入20个字。你也可以只填岗位名，系统会自动补全JD模板。";
        }
        if (first.msg) return first.msg;
      }
      if (typeof err.detail === "string") return err.detail;
      if (err.message) return err.message;
      return "分析失败";
    }
    function renderList(container, items) {
      container.innerHTML = "";
      (items || []).forEach((txt) => {
        const li = document.createElement("li");
        li.textContent = txt;
        container.appendChild(li);
      });
    }

    el.form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(el.form);

      setStatus("分析中，请稍候...");
      try {
        const res = await fetch("./api/analyze", {
          method: "POST",
          body: fd,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({detail: "分析失败"}));
          throw new Error(extractErrorMessage(err));
        }

        const data = await res.json();
        state.markdown = data.optimized_markdown;

        el.scoreVal.textContent = `${data.score}`;
        el.coverageVal.textContent = `${data.coverage}%`;

        renderChips(el.matchedKeywords, data.matched_keywords);
        renderChips(el.missingKeywords, data.missing_keywords);

        el.summary.textContent = data.optimized.summary;
        renderList(el.rewrites, data.optimized.rewritten_experience);
        renderList(el.skills, data.optimized.skills_recommendations);
        renderList(el.interviews, data.optimized.interview_questions);

        el.resultCard.classList.remove("hidden");
        setStatus(`分析完成（ID: ${data.analysis_id}）`);
      } catch (err) {
        setStatus(err.message || "分析失败", true);
      }
    });

    el.downloadMd.addEventListener("click", () => {
      if (!state.markdown) return;
      const blob = new Blob([state.markdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "resume_optimized.md";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
